# TDTP Framework — DEV stack
#
# Минимальный запуск без внешних зависимостей:
#   - xzmercury в --dev (miniredis внутри, mock LDAP, без CA)
#   - orchestrator с --no-auth и community license
#   - tdtpcli работает как subprocess оркестратора
#
# Запуск:
#   docker compose -f deployments/docker/docker-compose.dev.yml up --build
#
# После запуска:
#   http://localhost:8080/healthz   — orchestrator
#   http://localhost:3000/healthz   — xzmercury

services:

  # ── xZMercury (dev mode: miniredis + mock LDAP, без CA) ───────────────────
  mercury:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.mercury
    image: tdtp/mercury:dev
    command: ["--dev"]
    environment:
      MERCURY_SERVER_SECRET: "dev-secret-change-in-production-32ch"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Orchestrator + tdtpcli ─────────────────────────────────────────────────
  worker:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.worker
    image: tdtp/worker:dev
    command:
      - "--scenarios"
      - "/scenarios"
      - "--schedules-seed"
      - "/schedules"
      - "--db"
      - "/data/orchestrator.db"
      - "--tdtpcli"
      - "/usr/local/bin/tdtpcli"
      - "--tmp"
      - "/tmp"
      - "--addr"
      - ":8080"
      - "--no-auth"                          # dev: no auth
      - "--mercury-url"
      - "http://mercury:3000"
    environment:
      MERCURY_SERVER_SECRET: "dev-secret-change-in-production-32ch"
      TDTP_AUDIT_FORMAT: "json"
    volumes:
      - ./scenarios:/scenarios:ro            # scenario YAML files
      - ./schedules:/schedules:ro            # schedule seed YAMLs
      - worker-data:/data                    # orchestrator.db
    ports:
      - "8080:8080"
    depends_on:
      mercury:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  worker-data:

networks:
  default:
    name: tdtp-dev
