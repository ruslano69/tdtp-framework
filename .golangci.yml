linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - unconvert
    - unparam
    - gosec
    - gocritic
    - prealloc
    - nilerr
    - bodyclose

run:
  timeout: 5m
  tests: false
  modules-download-mode: readonly

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - gocritic
    - path: integration_test\.go
      linters:
        - gosec
    - path: ^examples/
      linters:
        - all
    - path: cmd/bench
      linters:
        - errcheck
    - text: "Error return value of.*WriteString.*is not checked"
      linters:
        - errcheck
    - text: "Error return value of.*WriteByte.*is not checked"
      linters:
        - errcheck
    - text: "Error return value of.*Write.*is not checked"
      linters:
        - errcheck
    - text: "fmt\\.Fprintf"
      linters:
        - errcheck
    - text: "G201|G202|G306"
      linters:
        - gosec