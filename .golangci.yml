version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gocritic
    - prealloc
    - nilerr
    - bodyclose
  disable:
    - unparam  # Too many false positives for ctx parameters
    - revive   # Too many stutters/unused-parameter warnings
  exclusions:
    paths:
      - _test\.go
      - integration_test\.go
      - ^examples/
      - cmd/bench
      - cmd/tdtpcli/commands/inspect\.go
      - cmd/tdtpcli/commands/process_request\.go
    rules:
      - linters:
          - errcheck
        text: "Error return value of.*Write"
      - linters:
          - gosec
        text: "G201|G202|G304|G306"
      - linters:
          - unused
        path: pkg/adapters/mssql/hex\.go
      - linters:
          - unused
        path: pkg/core/packet/generator\.go
        text: "rowsToDataWithCompression"
      - linters:
          - unused
        path: pkg/processors/checksum\.go
        text: "bytesToUint64"

run:
  timeout: 5m
  tests: false
  modules-download-mode: readonly
