version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gocritic
    - prealloc
    - nilerr
    - bodyclose
  disable:
    - unparam  # Too many false positives for ctx parameters
    - revive   # Too many stutters/unused-parameter warnings
  exclusions:
    rules:
      - path: _test\.go
      - path: integration_test\.go
      - path: ^examples/
      - path: cmd/bench
      - path: cmd/tdtpcli/commands/inspect\.go
      - path: cmd/tdtpcli/commands/process_request\.go
      - linters:
          - errcheck
        text: "Error return value of.*Write"
      - linters:
          - gosec
        text: "G201|G202|G304|G306"

run:
  timeout: 5m
  tests: false
  modules-download-mode: readonly
