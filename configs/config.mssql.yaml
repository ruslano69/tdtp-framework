# MSSQL Configuration for TDTP CLI
#
# Usage:
#   tdtpcli --export MyTable --output data.tdtp.xml --config config.mssql.yaml
#
# Copy this file and fill in your connection details.
# Never commit the filled-in copy to version control.

database:
  type: mssql
  host: YOUR_SQL_SERVER     # e.g. sql-server.internal or 192.168.1.10
  port: 1433
  database: YOUR_DATABASE   # e.g. ProductionDB
  schema: dbo
  windows_auth: true        # Windows Authentication (SSPI / trusted_connection)
  # user: sa               # SQL auth — uncomment if not using windows_auth
  # password: ""           # use env var TDTP_DB_PASSWORD instead
  sslmode: disable          # encrypt=disable for local SQL Server without TLS

export:
  compress: true
  compress_level: 3

resilience:
  circuit_breaker:
    enabled: true
    threshold: 5
    timeout: 30
    max_concurrent: 100
    success_threshold: 2
  retry:
    enabled: true
    max_attempts: 3
    strategy: exponential
    initial_wait_ms: 1000
    max_wait_ms: 30000
    jitter: true

audit:
  enabled: true
  level: standard
  file: ./logs/audit.log
  max_size_mb: 100
