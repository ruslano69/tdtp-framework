<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="50%" stop-color="#888"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <radialGradient id="hubGrad">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#666"/>
    </radialGradient>
  </defs>
  <title>12-spoke wheel</title>
  <desc>Test wheel with hub, rim, spokes, ticks and cardinal labels</desc>
  <g id="wheel" inkscape:label="wheel-root">
    <circle cx="200" cy="200" r="180" fill="url(#rimGrad)" stroke="black" stroke-width="3"/>
    <g id="spokes" inkscape:label="spokes-group">
      <line x1="200" y1="170" x2="200" y2="20" stroke="#333" stroke-width="2"/>
      <line x1="215" y1="174" x2="290" y2="44" stroke="#333" stroke-width="2"/>
      <line x1="226" y1="185" x2="356" y2="110" stroke="#333" stroke-width="2"/>
      <line x1="230" y1="200" x2="380" y2="200" stroke="#333" stroke-width="2"/>
      <line x1="226" y1="215" x2="356" y2="290" stroke="#333" stroke-width="2"/>
      <line x1="215" y1="226" x2="290" y2="356" stroke="#333" stroke-width="2"/>
      <line x1="200" y1="230" x2="200" y2="380" stroke="#333" stroke-width="2"/>
      <line x1="185" y1="226" x2="110" y2="356" stroke="#333" stroke-width="2"/>
      <line x1="174" y1="215" x2="44" y2="290" stroke="#333" stroke-width="2"/>
      <line x1="170" y1="200" x2="20" y2="200" stroke="#333" stroke-width="2"/>
      <line x1="174" y1="185" x2="44" y2="110" stroke="#333" stroke-width="2"/>
      <line x1="185" y1="174" x2="110" y2="44" stroke="#333" stroke-width="2"/>
    </g>
    <g id="ticks">
      <circle cx="200" cy="10" r="4" fill="red"/>
      <circle cx="295" cy="35" r="4" fill="red"/>
      <circle cx="365" cy="105" r="4" fill="red"/>
      <circle cx="390" cy="200" r="4" fill="red"/>
      <circle cx="365" cy="295" r="4" fill="red"/>
      <circle cx="295" cy="365" r="4" fill="red"/>
      <circle cx="200" cy="390" r="4" fill="red"/>
      <circle cx="105" cy="365" r="4" fill="red"/>
      <circle cx="35" cy="295" r="4" fill="red"/>
      <circle cx="10" cy="200" r="4" fill="red"/>
      <circle cx="35" cy="105" r="4" fill="red"/>
      <circle cx="105" cy="35" r="4" fill="red"/>
    </g>
    <g id="labels" inkscape:label="cardinal-points">
      <text x="195" y="8" fill="black">N</text>
      <text x="382" y="205" fill="black">E</text>
      <text x="195" y="398" fill="black">S</text>
      <text x="2" y="205" fill="black">W</text>
    </g>
    <circle cx="200" cy="200" r="30" fill="url(#hubGrad)" stroke="black" stroke-width="2"/>
  </g>
</svg>
