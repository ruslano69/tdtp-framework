id: sync-countries-v1
version: "1.0"

loop_guard:
  source_system: rabbitmq-travel
  target_system: postgres-branch
  min_interval: "5s"

input_source:
  type: broker
  broker:
    type: rabbitmq
    host: localhost
    port: 5672
    user: tdtp
    password: tdtp
    queue: tdtp.sync.countries
    durable: true

target_connection:
  type: postgres
  dsn: "host=localhost port=5433 dbname=tdtp_branch user=tdtp password=tdtp sslmode=disable"

targets:
  - id: countries_cache
    table: public.countries_cache
    upsert_key: country_id
    fields:
      - {from: "country_id",       to: "country_id"}
      - {from: "country_code",     to: "country_code"}
      - {from: "country_name",     to: "country_name"}
      - {from: "continent",        to: "continent"}
      - {from: "currency_code",    to: "currency_code"}
      - {from: "is_visa_required", to: "is_visa_required"}
