# ETL Pipeline Example Configuration
# Пример конфигурации для объединения данных из разных источников

name: "Multi-Database Report"
version: "1.0"
description: "Объединение пользователей, заказов и продуктов из PostgreSQL, MS SQL Server и MySQL"

# ============================================================================
# ИСТОЧНИКИ ДАННЫХ (Sources)
# ============================================================================

sources:
  # PostgreSQL - Пользователи
  - name: users  # Используется как имя таблицы в workspace
    type: postgres
    dsn: "postgres://user:password@localhost:5432/users_db?sslmode=disable"
    query: |
      SELECT
        user_id,
        username,
        email,
        registration_date,
        country
      FROM users
      WHERE active = true
        AND registration_date >= '2024-01-01'
      ORDER BY user_id

  # MS SQL Server - Заказы
  - name: orders  # Используется как имя таблицы в workspace
    type: mssql
    dsn: "server=localhost;user id=sa;password=YourPassword123;database=OrdersDB;encrypt=disable"
    query: |
      SELECT
        order_id,
        user_id,
        order_date,
        total_amount,
        status
      FROM Orders
      WHERE status IN ('completed', 'shipped')
        AND order_date >= '2024-01-01'

  # MySQL - Продукты
  - name: products  # Используется как имя таблицы в workspace
    type: mysql
    dsn: "root:password@tcp(localhost:3306)/products_db?parseTime=true"
    query: |
      SELECT
        product_id,
        product_name,
        category,
        price
      FROM products
      WHERE in_stock = 1
        AND price > 0

# ============================================================================
# WORKSPACE (Рабочая среда для JOIN)
# ============================================================================

workspace:
  type: sqlite
  mode: ":memory:"  # Использовать оперативную память (быстро)
  # mode: "workspace.db"  # Или сохранить на диск для отладки

# ============================================================================
# ТРАНСФОРМАЦИЯ (SQL для объединения данных)
# ============================================================================

transform:
  result_table: "user_order_summary"
  sql: |
    -- Объединяем данные из всех источников
    SELECT
      u.user_id,
      u.username,
      u.email,
      u.country,
      u.registration_date,

      -- Статистика заказов
      COUNT(DISTINCT o.order_id) as total_orders,
      COALESCE(SUM(o.total_amount), 0) as total_spent,
      MIN(o.order_date) as first_order_date,
      MAX(o.order_date) as last_order_date,

      -- Топ категория продуктов
      (
        SELECT p.category
        FROM orders o2
        JOIN products p ON o2.order_id = p.product_id
        WHERE o2.user_id = u.user_id
        GROUP BY p.category
        ORDER BY COUNT(*) DESC
        LIMIT 1
      ) as favorite_category

    FROM users u
    LEFT JOIN orders o ON u.user_id = o.user_id
    GROUP BY
      u.user_id,
      u.username,
      u.email,
      u.country,
      u.registration_date
    HAVING total_orders > 0
    ORDER BY total_spent DESC
    LIMIT 1000

# ============================================================================
# ВЫВОД (Куда экспортировать результаты)
# ============================================================================

output:
  type: tdtp
  tdtp:
    destination: "reports/user_order_summary.xml"
    format: "xml"
    compression: true  # Использовать zstd сжатие (уровень 3 - сбалансированный)

