#    mem_limit_mb: 100     # лимит сжатых данных в памяти, МБ (0 = disk-spool)

# ============================================================================
# ПРОИЗВОДИТЕЛЬНОСТЬ
# ============================================================================

performance:
  timeout: 300              # Максимальное время выполнения (секунды)
  batch_size: 10000         # Размер батча для загрузки
  parallel_sources: true    # Загружать источники параллельно
  max_memory_mb: 2048       # Лимит памяти (MB)

# ============================================================================
# АУДИТ И ЛОГИРОВАНИЕ
# ============================================================================

audit:
  enabled: true
  log_file: "logs/etl_pipeline.log"
  log_queries: true         # Логировать SQL запросы
  log_errors: true          # Логировать ошибки

# ============================================================================
# ОБРАБОТКА ОШИБОК
# ============================================================================

error_handling:
  on_source_error: "continue"    # continue | fail
  on_transform_error: "fail"     # continue | fail
  on_export_error: "fail"        # continue | fail
  retry_count: 3
  retry_delay_sec: 5

# ============================================================================
# ИСПОЛЬЗОВАНИЕ
# ============================================================================

# Safe mode (READ-ONLY, по умолчанию):
#   tdtpcli --pipeline etl_pipeline_example.yaml
#
# Unsafe mode (все SQL операции, требует admin):
#   sudo tdtpcli --pipeline etl_pipeline_example.yaml --unsafe
#
# Режимы безопасности:
#   🔒 SAFE   - Только SELECT/WITH, без прав admin
#   🔓 UNSAFE - Все SQL операции, требует права admin
#
