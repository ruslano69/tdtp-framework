name: Security

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    # Run security checks weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'

jobs:
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Use latest stable Go for govulncheck. The toolchain directive in
          # go.mod is pinned to the patch that fixes all known stdlib CVEs
          # (currently go1.26.4 for GO-2026-5037, GO-2026-5039).
          # When new stdlib CVEs appear, bump toolchain in go.mod accordingly.
          go-version: 'stable'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # dependency-review:
  #   name: Dependency Review
  #   runs-on: ubuntu-latest
  #   if: github.event_name == 'pull_request'
  #
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #
  #     - name: Dependency Review
  #       uses: actions/dependency-review-action@v4
  #
  # Note: Requires Dependency graph to be enabled in repository settings:
  # https://github.com/ruslano69/tdtp-framework/settings/security_analysis

  nancy:
    name: Nancy Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'
          cache: true

      - name: Write Go List to file
        run: go list -json -m all > go.list

      - name: Run Nancy
        uses: sonatype-nexus-community/nancy-github-action@main
        continue-on-error: true
