name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # ── Unit tests (no external services required) ──────────────────────────────
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23', '1.24']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Verify dependencies
      env:
        GOTOOLCHAIN: local  # use the matrix Go, never auto-download toolchain
        GOWORK: off         # go.work requires go1.24; disable for matrix < 1.24
      run: |
        go mod verify
        go mod download

    - name: Build
      env:
        GOTOOLCHAIN: local
        GOWORK: off
      run: go build -tags nokafka -v ./...

    - name: Run unit tests
      # -tags nokafka: exclude kafka (no broker in CI)
      # -tags integration is NOT set: skip all tests/integration/ and other
      #   integration_test.go files that require external services
      # -short: additional signal for any test that checks testing.Short()
      env:
        GOTOOLCHAIN: local
        GOWORK: off
      run: go test -tags nokafka -short -race -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Upload coverage to Codecov
      if: matrix.go-version == '1.24'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.txt
        fail_ci_if_error: false

  # ── Build CLI binary ─────────────────────────────────────────────────────────
  build:
    name: Build CLI
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.13'
        cache: true

    - name: Build tdtpcli (nokafka)
      run: go build -tags nokafka -v -o /tmp/tdtpcli ./cmd/tdtpcli/

    - name: Test tdtpcli binary
      run: /tmp/tdtpcli --help || echo "CLI help command executed"

  # ── Integration tests (PostgreSQL + RabbitMQ) ────────────────────────────────
  # Runs only on push/PR to main/master so feature branches don't spam emails.
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tdtp_user
          POSTGRES_PASSWORD: tdtp_dev_pass_2025
          POSTGRES_DB: tdtp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: tdtp_test
          RABBITMQ_DEFAULT_PASS: tdtp_test_password
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.13'
        cache: true

    - name: Run integration tests
      run: go test -tags "integration nokafka" -v -timeout 120s ./tests/integration/ ./pkg/adapters/postgres/...
